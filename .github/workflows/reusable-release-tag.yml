name: Reusable Release Tag

on:
  workflow_call:
    inputs:
      release-title-regex:
        description: "Regex used to extract semver from release PR title"
        required: false
        type: string
        default: '^release:[[:space:]]v([0-9]+\.[0-9]+\.[0-9]+)$'

permissions:
  contents: write
  pull-requests: read

jobs:
  tag-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Create tag from release PR title
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          SHA: ${{ github.sha }}
          RELEASE_TITLE_REGEX: ${{ inputs.release-title-regex }}
        run: |
          set -euo pipefail

          # Retry PR lookup up to 3 times with 10s delay — the GitHub API
          # can take a few seconds to index the commit-to-PR association
          # after a merge.
          pr_title=""
          for attempt in 1 2 3; do
            pr_title=$(gh api "repos/${REPOSITORY}/commits/${SHA}/pulls" --jq '.[0].title // ""')
            if [[ -n "${pr_title}" ]]; then
              break
            fi
            echo "Attempt ${attempt}: No PR found for ${SHA}. Retrying in 10s..."
            sleep 10
          done

          if [[ -z "${pr_title}" ]]; then
            echo "No PR associated with commit ${SHA} after 3 attempts. Skipping tag creation."
            exit 0
          fi

          if [[ ! "${pr_title}" =~ ${RELEASE_TITLE_REGEX} ]]; then
            echo "PR title does not match release title pattern: ${pr_title}"
            exit 0
          fi

          tag="v${BASH_REMATCH[1]}"

          if git rev-parse "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists. Skipping."
            exit 0
          fi

          git tag "${tag}" "${SHA}"
          git push origin "${tag}"

          echo "Created tag ${tag} at ${SHA}."
