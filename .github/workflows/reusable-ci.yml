name: Reusable CI

on:
  workflow_call:
    inputs:
      node-version:
        description: Node.js version to use
        required: false
        default: "22"
        type: string
      workdir:
        description: Working directory for monorepos
        required: false
        default: "."
        type: string
      install-command:
        description: "Install command (default: npm ci)"
        required: false
        default: "npm ci"
        type: string
      test-command:
        description: Command used to run tests
        required: false
        default: ""
        type: string

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.workdir }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs['node-version'] }}
          cache: npm
          cache-dependency-path: ${{ inputs.workdir }}/package-lock.json

      - name: Install dependencies
        run: ${{ inputs['install-command'] }}

      - name: Lint
        run: npm run lint --if-present

      - name: Typecheck
        run: npm run typecheck --if-present

      - name: Build
        run: npm run build --if-present

      - name: Test
        if: ${{ inputs['test-command'] != '' }}
        run: ${{ inputs['test-command'] }}
