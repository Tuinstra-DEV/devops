# Template: Release PR workflow for consumer repos.
# Copy this file to your consumer repo at .github/workflows/release.yml.
#
# Trigger manually via "Run workflow" in GitHub Actions.
# Creates a PR from develop → main with a versioned title and PR-based changelog.
# Merging the PR triggers Deploy Production.

name: release-pr

on:
  workflow_dispatch:
    inputs:
      release-mode:
        description: Release mode (semver or date)
        required: false
        default: semver
        type: choice
        options:
          - semver
          - date
      bump:
        description: Release bump type (auto detects from PR titles)
        required: false
        default: auto
        type: choice
        options:
          - auto
          - patch
          - minor
          - major

jobs:
  release-pr:
    uses: marcel-tuinstra/devops/.github/workflows/reusable-release-pr.yml@v1
    secrets: inherit
    with:
      release-mode: ${{ inputs.release-mode }}
      bump: ${{ inputs.bump }}
