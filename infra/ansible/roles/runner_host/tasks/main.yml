---
- name: Assert immutable image inputs are pinned
  ansible.builtin.assert:
    that:
      - runner_base_image_source | length > 0
      - runner_base_image_sha256 is match('^[a-f0-9]{64}$')
      - runner_production_networks_reviewed | bool
      - (runner_blocked_production_ipv4_cidrs | length) + (runner_blocked_production_ipv6_cidrs | length) > 0
    fail_msg: Pin the image and explicitly configure at least one production deny CIDR.

- name: Assert runner capacity contract
  ansible.builtin.assert:
    that:
      - runner_max_concurrency | int == 2
      - runner_vcpus | int == 4
      - runner_memory_mib | int == 6144
      - runner_host_memory_reserve_mib | int >= 1024
      - runner_host_memory_reserve_mib | int <= 65536
      - ansible_processor_vcpus | int >= (runner_max_concurrency | int) * (runner_vcpus | int)
      - ansible_memtotal_mb | int >= ((runner_max_concurrency | int) * (runner_memory_mib | int)) + (runner_host_memory_reserve_mib | int)
    fail_msg: Host capacity must fit two 4-vCPU, 6144-MiB runners plus the memory reserve.

- name: Check KVM device
  ansible.builtin.stat:
    path: /dev/kvm
  register: runner_kvm_device

- name: Require hardware virtualization
  ansible.builtin.assert:
    that:
      - runner_kvm_device.stat.exists
      - runner_kvm_device.stat.ischr
    fail_msg: /dev/kvm is required; enable virtualization before provisioning.

- name: Require dedicated runner filesystems
  ansible.builtin.assert:
    that:
      - "'/mnt/ssd1000-01' in (ansible_mounts | map(attribute='mount') | list)"
      - "'/mnt/hdd1000-01' in (ansible_mounts | map(attribute='mount') | list)"
    fail_msg: Refusing to place overlays or audit logs on the host root filesystem.

- name: Install virtualization and policy packages
  ansible.builtin.apt:
    name:
      - cloud-image-utils
      - libvirt-daemon-system
      - nftables
      - python3
      - qemu-kvm
      - qemu-utils
      - virtinst
    state: present
    update_cache: true

- name: Create dedicated manager account
  ansible.builtin.user:
    name: ci-runner-manager
    system: true
    create_home: false
    shell: /usr/sbin/nologin

- name: Create runner directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: /etc/ci-runner, owner: root, group: ci-runner-manager, mode: '0750' }
    - { path: /usr/local/libexec, owner: root, group: root, mode: '0755' }
    - { path: /var/lib/ci-runner/images, owner: root, group: root, mode: '0755' }
    - { path: /var/lib/ci-runner-manager/state, owner: ci-runner-manager, group: ci-runner-manager, mode: '0700' }
    - { path: /mnt/ssd1000-01/ci-runner, owner: root, group: kvm, mode: '0710' }
    - { path: /mnt/hdd1000-01/ci-audit, owner: ci-runner-manager, group: ci-runner-manager, mode: '0750' }

- name: Inspect root-provisioned GitHub credential
  ansible.builtin.stat:
    path: /etc/ci-runner/github.token
  register: runner_github_credential

- name: Require private GitHub credential
  ansible.builtin.assert:
    that:
      - runner_github_credential.stat.exists
      - runner_github_credential.stat.isreg
      - (runner_github_credential.stat.pw_name | default('')) == 'root'
      - (runner_github_credential.stat.mode | default('')) == '0600'
    fail_msg: Provision /etc/ci-runner/github.token as root mode 0600 outside Ansible source control.

- name: Inspect existing services before image activation
  ansible.builtin.service_facts:

- name: Stop runner admission before image activation
  ansible.builtin.systemd:
    name: ci-runner-manager.service
    state: stopped
  when: "'ci-runner-manager.service' in ansible_facts.services"

- name: Inspect runner domains before image activation
  ansible.builtin.command:
    argv:
      - virsh
      - list
      - --all
      - --name
  register: runner_existing_domains
  changed_when: false

- name: Require a fully drained runner before image activation
  ansible.builtin.assert:
    that:
      - runner_existing_domains.stdout_lines | select('match', '^sanctuary-ci-') | list | length == 0
    fail_msg: Refusing to switch the base image while a Sanctuary CI domain exists.

- name: Inspect runner overlay directory before image activation
  ansible.builtin.find:
    paths: /mnt/ssd1000-01/ci-runner
    file_type: any
    hidden: true
    recurse: false
  register: runner_overlay_entries

- name: Require no runner overlays before image activation
  ansible.builtin.assert:
    that:
      - runner_overlay_entries.matched == 0
    fail_msg: Refusing to switch the base image while a runner overlay or seed remains.

- name: Install digest-versioned immutable base image
  ansible.builtin.get_url:
    url: "{{ runner_base_image_source }}"
    dest: "/var/lib/ci-runner/images/ubuntu-24.04-runner-{{ runner_base_image_sha256 }}.qcow2"
    checksum: "sha256:{{ runner_base_image_sha256 }}"
    owner: root
    group: root
    mode: '0444'

- name: Atomically activate image and retain the previous target
  ansible.builtin.shell: |
    set -euo pipefail
    image_root=/var/lib/ci-runner/images
    current="$image_root/ubuntu-24.04-runner.qcow2"
    previous="$image_root/ubuntu-24.04-runner.previous.qcow2"
    target="$image_root/ubuntu-24.04-runner-{{ runner_base_image_sha256 }}.qcow2"
    old=""
    if [ -L "$current" ]; then
      old="$(readlink -f "$current")"
      if [[ ! "$old" =~ ^$image_root/ubuntu-24\.04-runner-[a-f0-9]{64}\.qcow2$ ]]; then
        echo "refusing unexpected current image target" >&2
        exit 1
      fi
    elif [ -e "$current" ]; then
      echo "refusing to replace a non-symlink current image" >&2
      exit 1
    fi
    if [ "$old" = "$target" ]; then
      exit 0
    fi
    if [ -n "$old" ]; then
      ln -sfn "$old" "$previous.new"
      mv -Tf "$previous.new" "$previous"
    fi
    ln -sfn "$target" "$current.new"
    mv -Tf "$current.new" "$current"
    echo changed
  args:
    executable: /bin/bash
  register: runner_image_activation
  changed_when: "'changed' in runner_image_activation.stdout_lines"
  notify: Restart runner manager

- name: Install manager platform files
  ansible.builtin.copy:
    src: "{{ runner_manager_source_root }}/{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: root
    group: "{{ item.group | default('root') }}"
    mode: "{{ item.mode }}"
  loop:
    - { src: runner/manager/ci_runner_manager.py, dest: /usr/local/bin/ci-runner-manager, mode: '0755' }
    - { src: runner/host-helper/ci_runner_host_helper.py, dest: /usr/local/libexec/ci-runner-host-helper, mode: '0755' }
    - { src: runner/systemd/ci-runner-manager.service, dest: /etc/systemd/system/ci-runner-manager.service, mode: '0644' }
    - { src: runner/systemd/ci-runner-host-helper.socket, dest: /etc/systemd/system/ci-runner-host-helper.socket, mode: '0644' }
    - { src: runner/systemd/ci-runner-host-helper@.service, dest: /etc/systemd/system/ci-runner-host-helper@.service, mode: '0644' }
    - { src: runner/systemd/sanctuary-ci-firewall.service, dest: /etc/systemd/system/sanctuary-ci-firewall.service, mode: '0644' }
    - { src: runner/logrotate/ci-runner-audit, dest: /etc/logrotate.d/ci-runner-audit, mode: '0644' }
  notify:
    - Restart runner host helper socket
    - Restart runner manager

- name: Install runner manager configuration
  ansible.builtin.template:
    src: manager.toml.j2
    dest: /etc/ci-runner/manager.toml
    owner: root
    group: ci-runner-manager
    mode: '0640'
  notify: Restart runner manager

- name: Remove obsolete runner manager sudo policy
  ansible.builtin.file:
    dest: /etc/sudoers.d/ci-runner-manager
    state: absent

- name: Install isolated network definition
  ansible.builtin.template:
    src: sanctuary-ci.xml.j2
    dest: /etc/ci-runner/sanctuary-ci.xml
    owner: root
    group: root
    mode: '0600'
  register: runner_network_definition

- name: Define and start runner network
  ansible.builtin.shell: |
    set -euo pipefail
    runner_libvirt_uri=qemu:///system
    runner_network_xml=/etc/ci-runner/sanctuary-ci.xml
    runner_network_effective_xml="$(mktemp)"
    runner_network_restart={{ runner_network_definition.changed | ternary('true', 'false') }}
    runner_network_config=/etc/libvirt/qemu/networks/sanctuary-ci.xml
    runner_network_autostart_link=/etc/libvirt/qemu/networks/autostart/sanctuary-ci.xml
    trap 'rm -f "$runner_network_effective_xml"' EXIT
    runner_network_was_active=false
    runner_network_was_persistent=false
    runner_network_was_autostart=false
    if virsh --connect "$runner_libvirt_uri" net-list --name | grep -Fxq sanctuary-ci; then
      runner_network_was_active=true
    fi
    if virsh --connect "$runner_libvirt_uri" net-list --all --persistent --name | grep -Fxq sanctuary-ci; then
      runner_network_was_persistent=true
    fi
    if virsh --connect "$runner_libvirt_uri" net-list --all --autostart --name | grep -Fxq sanctuary-ci; then
      runner_network_was_autostart=true
    fi
    if runner_network_uuid="$(virsh --connect "$runner_libvirt_uri" net-uuid sanctuary-ci 2>/dev/null)"; then
      if [[ ! "$runner_network_uuid" =~ ^[a-f0-9-]{36}$ ]]; then
        echo "refusing invalid existing runner network UUID" >&2
        exit 1
      fi
      awk -v runner_network_uuid="$runner_network_uuid" '
        /<name>sanctuary-ci<\/name>/ {
          print
          print "  <uuid>" runner_network_uuid "</uuid>"
          next
        }
        { print }
      ' "$runner_network_xml" > "$runner_network_effective_xml"
    else
      cp "$runner_network_xml" "$runner_network_effective_xml"
    fi
    virsh --connect "$runner_libvirt_uri" net-define "$runner_network_effective_xml"
    if [ "$runner_network_was_autostart" = false ] &&
       { [ -e "$runner_network_autostart_link" ] || [ -L "$runner_network_autostart_link" ]; }; then
      runner_network_autostart_target="$(readlink "$runner_network_autostart_link" 2>/dev/null || true)"
      if [ ! -L "$runner_network_autostart_link" ] ||
         [ "$runner_network_autostart_target" != "$runner_network_config" ]; then
        echo "refusing unexpected runner autostart entry" >&2
        exit 1
      fi
      rm -f -- "$runner_network_autostart_link"
    fi
    virsh --connect "$runner_libvirt_uri" net-autostart sanctuary-ci
    if [ "$runner_network_restart" = true ] && [ "$runner_network_was_active" = true ]; then
      virsh --connect "$runner_libvirt_uri" net-destroy sanctuary-ci
    fi
    if ! virsh --connect "$runner_libvirt_uri" net-list --name | grep -Fxq sanctuary-ci; then
      virsh --connect "$runner_libvirt_uri" net-start sanctuary-ci
    fi
    if [ "$runner_network_restart" = true ] ||
       [ "$runner_network_was_active" = false ] ||
       [ "$runner_network_was_persistent" = false ] ||
       [ "$runner_network_was_autostart" = false ]; then
      echo changed
    fi
  args:
    executable: /bin/bash
  changed_when: "'changed' in runner_network_activation.stdout_lines"
  register: runner_network_activation

- name: Install runner egress guard
  ansible.builtin.template:
    src: sanctuary-ci.nft.j2
    dest: /etc/ci-runner/sanctuary-ci.nft
    owner: root
    group: root
    mode: '0644'
    validate: /usr/sbin/nft -c -f %s
  notify: Apply sanctuary firewall transaction

- name: Enable runner services
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    state: started
    daemon_reload: true
  loop:
    - libvirtd.service
    - sanctuary-ci-firewall.service
    - ci-runner-host-helper.socket
    - ci-runner-manager.service
